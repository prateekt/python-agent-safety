name: Publish to PyPI

# Publishes the package to PyPI using Trusted Publishing (OIDC) — no API token
# stored in the repo. Runs when a GitHub Release is published, or manually.
#
# One-time setup (on PyPI): add a "pending publisher" for the project
#   project name: agent-safety
#   owner: prateekt   repo: python-agent-safety
#   workflow: publish.yml   environment: pypi
# After the first successful publish, the project exists and the publisher is permanent.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Sanity-check the package before publishing
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-safety
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
